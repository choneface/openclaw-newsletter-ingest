# Legacy example sources. New pollers get their own sources.yaml under:
# ~/.oni/pollers/<slug>/sources.yaml
#
# Each entry is one source. To add a new source, append a new entry and
# re-run `oni poll`. The `gmail_query` is Gmail's full search syntax
# (https://support.google.com/mail/answer/7190) — anything you can type
# into Gmail's search bar works.
#
# `parser` is reserved for source-specific analyzer dispatch. The current
# TypeScript implementation uses default_event_extractor.

- name: coolstuffnyc
  description: Cool Stuff NYC newsletter — weekly NYC events
  # Exact sender unknown; refine when first newsletter arrives. The `OR` lets
  # us catch a few likely shapes; tighten once we see the real address.
  gmail_query: 'from:coolstuffnyc.com OR subject:"cool stuff nyc"'
  parser: default_event_extractor
  enabled: true

# Self-test source: emails the configured GMAIL_USER sends to itself.
# Use this to validate the pipeline end-to-end without waiting for a real
# newsletter — just send yourself an email with a fake event in the body.
- name: _self_test
  description: Test source — emails from GMAIL_USER to itself, tagged [oni-test] in subject
  gmail_query: 'subject:"[oni-test]"'
  parser: default_event_extractor
  enabled: true
